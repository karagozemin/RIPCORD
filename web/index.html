<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIPCORD Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>RIPCORD</h1>
        <p>Real-time liquidation rescue + risk execution firewall</p>
      </header>

      <section class="controls card">
        <div class="row">
          <label for="mode">Source</label>
          <select id="mode">
            <option value="mock">mock</option>
            <option value="adapter">adapter (.env)</option>
          </select>

          <label for="shock">Shock %</label>
          <input id="shock" type="number" value="0.07" step="0.01" min="0.01" max="0.5" />

          <label for="autoRefresh">Auto Refresh</label>
          <input id="autoRefresh" type="checkbox" />

          <label for="interval">Interval (sec)</label>
          <input id="interval" type="number" value="5" step="1" min="2" max="60" />

          <button id="runBtn">Run Cycle</button>
          <button id="retryBtn" class="secondary">Retry</button>
        </div>
        <div class="row status-row">
          <span id="statusBadge" class="badge badge-low">idle</span>
          <span id="staleBadge" class="badge badge-medium hidden">stale</span>
          <span id="lastUpdated">Last updated: -</span>
        </div>
      </section>

      <section class="tabs card">
        <button class="tab active" data-view="overview">Overview</button>
        <button class="tab" data-view="risk">Risk Breakdown</button>
        <button class="tab" data-view="rescue">Rescue</button>
        <button class="tab" data-view="replay">Replay</button>
        <button class="tab" data-view="policies">Policies</button>
      </section>

      <section id="view-overview" class="view grid"></section>
      <section id="view-risk" class="view hidden"></section>
      <section id="view-rescue" class="view hidden"></section>
      <section id="view-replay" class="view hidden"></section>
      <section id="view-policies" class="view hidden"></section>

      <section class="card">
        <h2>Errors / Empty State</h2>
        <div id="errors">No errors</div>
      </section>

      <section class="card">
        <h2>Raw JSON</h2>
        <pre id="raw"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
