<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIPCORD Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>RIPCORD</h1>
        <p>Real-time liquidation rescue + risk execution firewall</p>
      </header>

      <section class="controls card">
        <div class="row">
          <label for="mode">Kaynak</label>
          <select id="mode">
            <option value="mock">mock</option>
            <option value="adapter">adapter (.env)</option>
          </select>

          <label for="shock">Shock %</label>
          <input id="shock" type="number" value="0.07" step="0.01" min="0.01" max="0.5" />

          <button id="runBtn">Run Cycle</button>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <h2>Risk</h2>
          <div id="risk"></div>
        </article>
        <article class="card">
          <h2>Policy</h2>
          <div id="policy"></div>
        </article>
        <article class="card">
          <h2>Plan</h2>
          <div id="plan"></div>
        </article>
        <article class="card">
          <h2>Replay</h2>
          <div id="replay"></div>
        </article>
      </section>

      <section class="card">
        <h2>Raw JSON</h2>
        <pre id="raw"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
